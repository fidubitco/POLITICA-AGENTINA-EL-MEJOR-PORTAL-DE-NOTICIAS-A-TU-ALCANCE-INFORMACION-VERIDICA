services:
  # ============================================
  # OLLAMA - Local LLMs (Llama, Mistral, etc)
  # ============================================
  ollama:
    image: ollama/ollama:latest
    container_name: politica-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_MODELS=/root/.ollama/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - ai_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # OLLAMA WEB UI - Interface for Ollama
  # ============================================
  ollama-webui:
    image: ghcr.io/ollama-webui/ollama-webui:main
    container_name: politica-ollama-ui
    restart: unless-stopped
    ports:
      - "3030:8080"
    environment:
      - OLLAMA_API_BASE_URL=http://ollama:11434/api
    depends_on:
      - ollama
    networks:
      - ai_network

  # ============================================
  # n8n - Automation & AI Workflows
  # ============================================
  n8n:
    image: n8nio/n8n:latest
    container_name: politica-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=admin123
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - EXECUTIONS_DATA_SAVE_ON_SUCCESS=all
      - EXECUTIONS_DATA_SAVE_ON_ERROR=all
      - WEBHOOK_URL=http://localhost:5678/
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/workflows
    networks:
      - ai_network
    depends_on:
      - postgres
      - redis

  # ============================================
  # PostgreSQL - Database
  # ============================================
  postgres:
    image: postgres:15-alpine
    container_name: politica-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: politica_user
      POSTGRES_PASSWORD: politica_password_2024
      POSTGRES_DB: politica_argentina
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    networks:
      - ai_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U politica_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # pgvector - Vector Database for Embeddings
  # ============================================
  pgvector:
    image: ankane/pgvector:latest
    container_name: politica-pgvector
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: vector_user
      POSTGRES_PASSWORD: vector_password_2024
      POSTGRES_DB: vector_db
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    networks:
      - ai_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vector_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Redis - Cache & Queue
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: politica-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - ai_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Squid Proxy - Rotating Proxy Server
  # ============================================
  squid-proxy:
    image: ubuntu/squid:latest
    container_name: politica-squid
    restart: unless-stopped
    ports:
      - "3128:3128"
    volumes:
      - ./squid/squid.conf:/etc/squid/squid.conf
      - ./squid/passwords:/etc/squid/passwords
    networks:
      - ai_network
    command: squid -f /etc/squid/squid.conf -N

  # ============================================
  # Tor Proxy - Anonymous Requests
  # ============================================
  tor-proxy:
    image: dperson/torproxy:latest
    container_name: politica-tor
    restart: unless-stopped
    ports:
      - "9050:9050"  # SOCKS5
      - "9051:9051"  # Control port
    environment:
      - TOR_NewCircuitPeriod=30
      - TOR_MaxCircuitDirtiness=600
    networks:
      - ai_network

  # ============================================
  # Chromium - Headless Browser for Scraping
  # ============================================
  chromium:
    image: browserless/chrome:latest
    container_name: politica-chromium
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - CONNECTION_TIMEOUT=600000
      - MAX_CONCURRENT_SESSIONS=10
      - PREBOOT_CHROME=true
    networks:
      - ai_network

  # ============================================
  # AI API Gateway (Custom Express Server)
  # ============================================
  ai-gateway:
    build:
      context: ./ai-gateway
      dockerfile: Dockerfile
    container_name: politica-ai-gateway
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - OLLAMA_URL=http://ollama:11434
      - POSTGRES_URL=postgresql://politica_user:politica_password_2024@postgres:5432/politica_argentina
      - REDIS_URL=redis://redis:6379
      - VECTOR_DB_URL=postgresql://vector_user:vector_password_2024@pgvector:5432/vector_db
      - TOR_PROXY=socks5://tor-proxy:9050
      - SQUID_PROXY=http://squid-proxy:3128
    volumes:
      - ./ai-gateway:/app
      - /app/node_modules
    depends_on:
      - ollama
      - postgres
      - redis
      - pgvector
      - tor-proxy
      - squid-proxy
    networks:
      - ai_network

  # ============================================
  # Nginx - Reverse Proxy
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: politica-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - ai-gateway
      - n8n
      - ollama-webui
    networks:
      - ai_network

volumes:
  ollama_data:
    driver: local
  postgres_data:
    driver: local
  pgvector_data:
    driver: local
  redis_data:
    driver: local
  n8n_data:
    driver: local

networks:
  ai_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
