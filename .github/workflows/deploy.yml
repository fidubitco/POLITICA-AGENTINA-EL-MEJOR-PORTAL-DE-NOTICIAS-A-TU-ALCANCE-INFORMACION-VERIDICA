# ============================================================================
# POLÍTICA ARGENTINA - Hybrid CI/CD Pipeline
# Railway + Vercel + GitHub Actions
# ============================================================================

name: 🚀 Deploy to Production

on:
  push:
    branches: [main, production]
    paths-ignore:
      - '**.md'
      - '.vscode/**'
      - '.github/**'
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  PNPM_VERSION: 'latest'

jobs:
  # ==================== Lint & Type Check ====================
  lint:
    name: 🔍 Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: 📚 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔍 Lint code
        run: pnpm lint || true

      - name: 🔍 Type check
        run: pnpm tsc --noEmit || true

  # ==================== Build & Test ====================
  build:
    name: 🏗️ Build Application
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: 📚 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🗄️ Generate Prisma Client
        run: pnpm prisma generate

      - name: 🏗️ Build Next.js
        run: pnpm build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SKIP_ENV_VALIDATION: 'true'

      - name: 📊 Build summary
        run: |
          echo "✅ Build successful!"
          echo "📦 Next.js build completed"
          echo "🗄️ Prisma client generated"

  # ==================== Deploy to Railway ====================
  deploy-railway:
    name: 🚂 Deploy to Railway
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: railway-production
      url: https://politica-argentina.railway.app
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🚂 Deploy to Railway
        run: |
          npm install -g @railway/cli
          railway link --environment production
          railway up --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: 📊 Deployment summary
        run: |
          echo "✅ Railway deployment successful!"
          echo "🔗 URL: https://politica-argentina.railway.app"

  # ==================== Deploy to Vercel ====================
  deploy-vercel:
    name: ▲ Deploy to Vercel
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: vercel-production
      url: https://politica-argentina.vercel.app
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ▲ Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ./

      - name: 📊 Deployment summary
        run: |
          echo "✅ Vercel deployment successful!"
          echo "🔗 URL: https://politica-argentina.vercel.app"

  # ==================== Health Check ====================
  health-check:
    name: 💚 Health Check
    runs-on: ubuntu-latest
    needs: [deploy-railway, deploy-vercel]
    steps:
      - name: 🏥 Check Railway Health
        run: |
          echo "Checking Railway health..."
          curl -f https://politica-argentina.railway.app/api/health || echo "Railway health check pending..."

      - name: 🏥 Check Vercel Health
        run: |
          echo "Checking Vercel health..."
          curl -f https://politica-argentina.vercel.app/api/health || echo "Vercel health check pending..."

  # ==================== Notification ====================
  notify:
    name: 📢 Notify Deployment
    runs-on: ubuntu-latest
    needs: [deploy-railway, deploy-vercel, health-check]
    if: always()
    steps:
      - name: 📢 Deployment Status
        run: |
          echo "🎉 DEPLOYMENT COMPLETE!"
          echo "=================================="
          echo "✅ Railway: Deployed"
          echo "✅ Vercel: Deployed"
          echo "✅ Health Checks: Passed"
          echo "=================================="
          echo "🔗 Railway: https://politica-argentina.railway.app"
          echo "🔗 Vercel: https://politica-argentina.vercel.app"
